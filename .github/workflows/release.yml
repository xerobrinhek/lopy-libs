name: Release Libs

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create libs.zip
        run: |
          zip -r libs.zip llstd llgui
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: libs.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
